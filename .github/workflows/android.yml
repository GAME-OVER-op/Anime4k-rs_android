name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager 'ndk;27.0.12077973'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Download bundled FFmpeg binaries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L --retry 3 -o app/src/main/jniLibs/arm64-v8a/libffmpeg.so             https://github.com/hzw1199/Android-FFmpeg-Prebuilt/raw/main/ffmpeg-8.1.1/bin/ffmpeg
          curl -L --retry 3 -o app/src/main/jniLibs/arm64-v8a/libffprobe.so             https://github.com/hzw1199/Android-FFmpeg-Prebuilt/raw/main/ffmpeg-8.1.1/bin/ffprobe
          chmod 755 app/src/main/jniLibs/arm64-v8a/libffmpeg.so app/src/main/jniLibs/arm64-v8a/libffprobe.so
          file app/src/main/jniLibs/arm64-v8a/libffmpeg.so
          file app/src/main/jniLibs/arm64-v8a/libffprobe.so

      - name: Build release APK
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Anime4K-Upscaler-release-apk
          path: app/build/outputs/apk/release/*.apk
